<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alliance Members - KIS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
            background: url('KSA.png') center/cover no-repeat fixed;
        }

        /* ===== MOBILE BACKGROUND FIX ===== */
        @media (max-width: 768px) {
            body { background-size: contain; background-color: black; overflow-y: auto; }
        }

        .container {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        .panel, .panel-right {
            width: 48%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
        }

        .more-btn {
            position: absolute;
            right: 0;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #ffcc00;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .more-btn:hover { background: gold; transform: scale(1.05); }

        h3 { border-left: 4px solid #ffcc00; padding-left: 10px; margin-top: 20px; }

        .box {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
        }

        /* COLORS */
        .r5 { background: rgba(255, 215, 0, 0.6); color: #000; font-weight: bold; }
        .r4 { background: rgba(255, 165, 0, 0.5); color: #000; }
        .r3 { background: rgba(77, 184, 255, 0.5); color: #fff; }
        .r2 { background: rgba(144, 238, 144, 0.5); color: #000; }
        .r1 { background: rgba(180, 180, 180, 0.4); color: #fff; }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; }
            .panel, .panel-right { width: 100%; height: auto; margin-bottom: 20px; }
        }
    </style>
</head>
