<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alliance Members</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1b2b;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    h2 {
      margin-top: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .box {
      padding: 5px;
      text-align: center;
      border-radius: 5px;
    }

    .r5 { background: gold; color: black; }
    .r4 { background: orange; color: black; }
    .r3 { background: #4db8ff; color: black; }
    .r2 { background: lightgreen; color: black; }
    .r1 { background: gray; color: white; }

  </style>
</head>

<body>

  <h1>Alliance Members</h1>

  <h2 style="color:gold;">R5 (Leader)</h2>
  <div class="box r5">R5 NAME</div>

  <h2 style="color:orange;">R4 (Officers)</h2>
  <div class="grid">
    <script>
      for(let i=1;i<=20;i++){
        document.write(`<div class="box r4">R4 ${i}</div>`);
      }
    </script>
  </div>

  <h2 style="color:#4db8ff;">R3 (FC9 / FC10)</h2>
  <div class="grid">
    <script>
      for(let i=1;i<=100;i++){
        document.write(`<div class="box r3">R3 ${i}</div>`);
      }
    </script>
  </div>

  <h2 style="color:lightgreen;">R2 (Players)</h2>
  <div class="grid">
    <script>
      for(let i=1;i<=100;i++){
        document.write(`<div class="box r2">R2 ${i}</div>`);
      }
    </script>
  </div>

  <h2 style="color:gray;">R1 (Farmers)</h2>
  <div class="grid">
    <script>
      for(let i=1;i<=100;i++){
        document.write(`<div class="box r1">R1 ${i}</div>`);
      }
    </script>
  </div>

</body>
</html>
