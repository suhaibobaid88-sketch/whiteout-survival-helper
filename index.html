<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alliance System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  overflow: hidden;
  color: white;

  background-image: url('KSA.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* ===== MOBILE BACKGROUND FIX ===== */
@media (max-width: 768px) {
  body {
    background-size: contain;
    background-color: black;
  }
}

/* ===== CONTAINER ===== */
.container {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  gap: 20px;
  height: 100vh;
  box-sizing: border-box;
}

/* ===== PANELS ===== */
.panel,
.panel-right {
  width: 48%;
  background: rgba(0,0,0,0.35);
  border-radius: 10px;
  padding: 10px;
  overflow-y: auto;
}

/* ===== HEADER WITH BUTTON ===== */
.header-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.header-bar h2 {
  margin: 0;
}

/* ===== EVENTS BUTTON ===== */
.more-btn {
  position: absolute;
  right: 10px;
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  background: rgba(255,215,0,0.8);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.more-btn:hover {
  background: gold;
  transform: scale(1.05);
}

/* ===== TITLES ===== */
h3 {
  text-align: left;
}

/* ===== BOX ===== */
.box {
  padding: 6px;
  margin: 4px;
  border-radius: 5px;
}

/* ===== COLORS ===== */
.r5 { background: rgba(255,215,0,0.5); color: black; }
.r4 { background: rgba(255,165,0,0.4); color: black; }
.r3 { background: rgba(77,184,255,0.4); color: black; }
.r2 { background: rgba(144,238,144,0.4); color: black; }
.r1 { background: rgba(128,128,128,0.4); color: white; }

/* ===== MOBILE LAYOUT ===== */
@media (max-width: 768px) {
  body {
    overflow: auto;
  }

  .container {
    flex-direction: column;
    height: auto;
  }

  .panel,
  .panel-right {
    width: 100%;
    height: auto;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="panel">

    <div class="header-bar">
      <h2>Alliance Members</h2>

      <button class="more-btn" onclick="location.href='more.html'">
        More
      </button>
    </div>

    <h3>R5 (Leader)</h3>
    <div class="box r5">AlRuwaili ID:228636462</div>

    <hr>

    <h3>R4 (20)</h3>
    <div id="r4"></div>

  </div>

  <!-- RIGHT -->
  <div class="panel-right">

    <h2>Ranks System</h2>

    <h3>R3 (90 Players)</h3>
    <div id="r3"></div>

    <hr>

    <h3>R2 (30 Players)</h3>
    <div id="r2"></div>

    <hr>

    <h3>R1 (20 Players)</h3>
    <div id="r1"></div>

  </div>

</div>

<script>

/* ===== DATA (أنت تعدل هنا فقط) ===== */

let r4 = [
"3esawi","Player2","Player3","Player4","Player5",
"Player6","Player7","Player8","Player9","Player10",
"Player11","Player12","Player13","Player14","Player15",
"Player16","Player17","Player18","Player19","Player20"
];

let r3 = Array(90).fill("Empty");
let r2 = Array(30).fill("Empty");
let r1 = Array(20).fill("Empty");

/* ===== RENDER ===== */

function renderList(id,data,className){
  let container = document.getElementById(id);
  container.innerHTML = "";

  data.forEach(name => {
    container.innerHTML += `<div class="box ${className}">${name}</div>`;
  });
}

/* ===== LOAD ===== */
renderList("r4", r4, "r4");
renderList("r3", r3, "r3");
renderList("r2", r2, "r2");
renderList("r1", r1, "r1");

</script>

</body>
</html>
