<div class="panel">

  <h2>Alliance Members</h2>

  <!-- R5 -->
  <h3>R5</h3>
  <input id="r5input" placeholder="Enter R5 name">
  <button onclick="saveR5()">Save</button>
  <div id="r5show"></div>

  <hr>

  <h3>R4</h3>
  <div id="r4list"></div>

</div>

<script>
/* ====== R5 ====== */
function saveR5(){
  let name = document.getElementById("r5input").value;
  localStorage.setItem("r5", name);
  loadData();
}

/* ====== R4 ====== */
function addR4(){
  let list = JSON.parse(localStorage.getItem("r4") || "[]");
  list.push("R4 Member");
  localStorage.setItem("r4", JSON.stringify(list));
  loadData();
}

/* ====== تحميل البيانات ====== */
function loadData(){

  // R5
  let r5 = localStorage.getItem("r5") || "No R5";
  document.getElementById("r5show").innerHTML = r5;

  // R4
  let r4 = JSON.parse(localStorage.getItem("r4") || "[]");
  document.getElementById("r4list").innerHTML =
    r4.map((n,i)=>`<div>${n} ${i+1}</div>`).join("");

}

loadData();
</script>
