<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whiteout Survival Helper</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;

  /* الخلفية */
  background-image: url('KSA.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
}

/* يمين الصفحة للجدول */
.content {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 400px;
}

/* عنوان */
h1 {
  text-align: center;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 10px;
}

/* صناديق الأعضاء */
.box {
  padding: 5px;
  margin: 3px;
  border-radius: 5px;
}

/* ألوان شفافة */
.r5 { background: rgba(255,215,0,0.5); color: black; }
.r4 { background: rgba(255,165,0,0.5); color: black; }
.r3 { background: rgba(77,184,255,0.4); color: black; }
.r2 { background: rgba(144,238,144,0.4); color: black; }
.r1 { background: rgba(128,128,128,0.4); color: white; }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 5px;
}
</style>

</head>

<body>

<!-- الجدول يمين -->
<div class="content">

  <h1>Alliance Members</h1>

  <h2 style="color:gold;">R5 (Leader)</h2>
  <div class="box r5">R5 NAME</div>

  <h2 style="color:orange;">R4</h2>
  <div class="grid">
    <script>
      for(let i=1;i<=20;i++){
        document.write(`<div class="box r4">R4 ${i}</div>`);
      }
    </script>
  </div>

  <h2 style="color:#4db8ff;">R3</h2>
  <div class="grid">
    <script>
      for(let i=1;i<=20;i++){
        document.write(`<div class="box r3">R3 ${i}</div>`);
      }
    </script>
  </div>

  <h2 style="color:lightgreen;">R2</h2>
  <div class="grid">
    <script>
      for(let i=1;i<=20;i++){
        document.write(`<div class="box r2">R2 ${i}</div>`);
      }
    </script>
  </div>

  <h2 style="color:gray;">R1</h2>
  <div class="grid">
    <script>
      for(let i=1;i<=20;i++){
        document.write(`<div class="box r1">R1 ${i}</div>`);
      }
    </script>
  </div>

</div>

</body>
</html>
