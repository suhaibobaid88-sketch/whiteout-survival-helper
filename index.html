<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alliance System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  overflow: hidden;
  color: white;
  position: relative;
}

/* ===== BACKGROUND ===== */
.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.bg img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

/* ===== CONTAINER ===== */
.container {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  gap: 20px;
  height: 100vh;
  box-sizing: border-box;
}

/* ===== PANELS ===== */
.panel,
.panel-right {
  width: 48%;
  background: rgba(0,0,0,0.35);
  border-radius: 10px;
  padding: 10px;
  overflow-y: auto;
}

/* ===== TITLE ===== */
h2 {
  text-align: center;
}

/* ===== BOX ===== */
.box {
  padding: 6px;
  margin: 4px;
  border-radius: 5px;
  cursor: pointer;
}

/* ===== COLORS ===== */
.r5 { background: rgba(255,215,0,0.5); color: black; }
.r4 { background: rgba(255,165,0,0.4); color: black; }
.r3 { background: rgba(77,184,255,0.4); color: black; }
.r2 { background: rgba(144,238,144,0.4); color: black; }
.r1 { background: rgba(128,128,128,0.4); color: white; }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  body {
    overflow: auto;
  }

  .container {
    flex-direction: column;
    height: auto;
  }

  .panel,
  .panel-right {
    width: 100%;
    height: auto;
  }
}

</style>
</head>

<body>

<!-- ===== BACKGROUND ===== -->
<div class="bg">
  <img src="KSA.png">
</div>

<!-- ===== MAIN CONTAINER ===== -->
<div class="container">

  <!-- ================= LEFT ================= -->
  <div class="panel">

    <h2>Alliance Members</h2>

    <h3>R5 (Leader)</h3>
    <div id="r5" class="box r5" contenteditable="true"></div>

    <hr>

    <h3>R4 (20)</h3>
    <div id="r4"></div>

  </div>

  <!-- ================= RIGHT ================= -->
  <div class="panel-right">

    <h2>Ranks System</h2>

    <h3>R3 (90 Players)</h3>
    <div id="r3"></div>

    <hr>

    <h3>R2 (30 Players)</h3>
    <div id="r2"></div>

    <hr>

    <h3>R1 (20 Players)</h3>
    <div id="r1"></div>

  </div>

</div>

<script>

/* ===== LOAD ===== */
function load(){

  let r5 = localStorage.getItem("r5") || "Click to set R5";
  let r5box = document.getElementById("r5");
  r5box.innerText = r5;

  r5box.oninput = () => {
    localStorage.setItem("r5", r5box.innerText);
  };

  let r4 = JSON.parse(localStorage.getItem("r4") || "[]");
  let r4c = document.getElementById("r4");
  r4c.innerHTML = "";

  for(let i=0;i<20;i++){
    let name = r4[i] || "Click to edit";

    r4c.innerHTML += `
      <div class="box r4" contenteditable="true"
      oninput="saveRank('r4',${i},this.innerText)">
        ${name}
      </div>
    `;
  }

}

/* ===== RIGHT SIDE ===== */
function loadRight(){
  makeList("r3",90,"r3","rgba(77,184,255,0.4)");
  makeList("r2",30,"r2","rgba(144,238,144,0.4)");
  makeList("r1",20,"r1","rgba(128,128,128,0.4)");
}

function makeList(id,count,key,color){

  let data = JSON.parse(localStorage.getItem(key) || "[]");
  let c = document.getElementById(id);
  c.innerHTML = "";

  for(let i=0;i<count;i++){
    let name = data[i] || "Click to edit";

    c.innerHTML += `
      <div class="box"
      style="background:${color}"
      contenteditable="true"
      oninput="saveRank('${key}',${i},this.innerText)">
        ${name}
      </div>
    `;
  }
}

/* ===== SAVE ===== */
function saveRank(key,i,value){
  let data = JSON.parse(localStorage.getItem(key) || "[]");
  data[i] = value;
  localStorage.setItem(key, JSON.stringify(data));
}

/* ===== START ===== */
load();
loadRight();

</script>

</body>
</html>
