<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bear Trap Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("Bear.png") center/cover no-repeat;
}

.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 20px;
}

/* toolbar */
.toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 15px;
}

button, input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

.canvas {
    width: 100%;
    height: 70vh;
    border: 2px dashed rgba(255,255,255,0.3);
    position: relative;
}

/* shapes */
.shape {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: move;
    user-select: none;
    color: white;
    font-size: 14px;
}

.square { border-radius: 6px; }
.circle { border-radius: 50%; }

.selected {
    outline: 3px solid yellow;
}
</style>
</head>

<body>

<div class="overlay">

<div class="toolbar">
    <button onclick="addShape('square')">⬛</button>
    <button onclick="addShape('circle')">⚪</button>

    <input type="color" id="shapeColor">
    <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.7">
    
    <input type="color" id="textColor">

    <button onclick="resize(10)">➕ Size</button>
    <button onclick="resize(-10)">➖ Size</button>

    <button onclick="save()">💾 Save</button>
    <button onclick="deleteShape()">🗑</button>
</div>

<div class="canvas" id="canvas"></div>

</div>

<script>
let selected = null;
let shapes = [];

// ADD
function addShape(type) {
    let shape = {
        type,
        x: 50,
        y: 50,
        w: 80,
        h: 80,
        text: "Name",
        bg: "#ff0000",
        opacity: 0.7,
        color: "#ffffff"
    };
    shapes.push(shape);
    render();
}

// RENDER
function render() {
    const canvas = document.getElementById("canvas");
    canvas.innerHTML = "";

    shapes.forEach((s, i) => {
        let div = document.createElement("div");
        div.className = `shape ${s.type}`;
        div.style.left = s.x + "px";
        div.style.top = s.y + "px";
        div.style.width = s.w + "px";
        div.style.height = s.h + "px";

        div.style.background = hexToRgba(s.bg, s.opacity);
        div.style.color = s.color;

        div.contentEditable = true;
        div.innerText = s.text;

        div.onclick = (e) => {
            e.stopPropagation();
            selected = i;
            render();
        };

        div.oninput = () => {
            shapes[i].text = div.innerText;
        };

        // DRAG
        div.onmousedown = (e) => {
            let offsetX = e.offsetX;
            let offsetY = e.offsetY;

            function move(e) {
                shapes[i].x = e.pageX - offsetX;
                shapes[i].y = e.pageY - offsetY;
                render();
            }

            document.addEventListener("mousemove", move);
            document.onmouseup = () => {
                document.removeEventListener("mousemove", move);
            };
        };

        if (i === selected) div.classList.add("selected");

        canvas.appendChild(div);
    });
}

// COLOR SHAPE
document.getElementById("shapeColor").oninput = function() {
    if (selected != null) {
        shapes[selected].bg = this.value;
        render();
    }
};

// OPACITY
document.getElementById("opacity").oninput = function() {
    if (selected != null) {
        shapes[selected].opacity = this.value;
        render();
    }
};

// TEXT COLOR
document.getElementById("textColor").oninput = function() {
    if (selected != null) {
        shapes[selected].color = this.value;
        render();
    }
};

// RESIZE
function resize(val) {
    if (selected != null) {
        shapes[selected].w += val;
        shapes[selected].h += val;
        render();
    }
}

// DELETE
function deleteShape() {
    if (selected != null) {
        shapes.splice(selected, 1);
        selected = null;
        render();
    }
}

// SAVE
function save() {
    localStorage.setItem("bearMap", JSON.stringify(shapes));
}

// LOAD
function load() {
    let data = localStorage.getItem("bearMap");
    if (data) shapes = JSON.parse(data);
    render();
}

// HELPER
function hexToRgba(hex, opacity) {
    let r = parseInt(hex.substr(1,2),16);
    let g = parseInt(hex.substr(3,2),16);
    let b = parseInt(hex.substr(5,2),16);
    return `rgba(${r},${g},${b},${opacity})`;
}

document.getElementById("canvas").onclick = () => {
    selected = null;
    render();
};

load();
</script>

</body>
</html>
