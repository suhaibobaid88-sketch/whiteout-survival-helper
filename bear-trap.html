<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bear Trap</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
}

.wrapper {
    padding: 20px;
    overflow-x: auto;
}

.grid {
    display: grid;
    grid-template-columns: repeat(9, 60px);
    grid-auto-rows: 60px;
    gap: 3px;
    justify-content: center;
}

/* cells */
.cell {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 12px;
}

.p { background: rgba(0,255,0,0.15); }
.e { background: rgba(255,255,255,0.05); }
.b1 { background: rgba(255,0,0,0.4); font-weight: bold; }
.b2 { background: rgba(255,165,0,0.4); font-weight: bold; }
</style>
</head>

<body>

<div class="wrapper">

<div class="grid">

<!-- Row 1 -->
<div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell"></div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div>

<!-- Row 2 -->
<div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell"></div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div>

<!-- Row 3 -->
<div class="cell p">P</div><div class="cell p">P</div><div class="cell p">B2</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell"></div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div>

<!-- Row 4 -->
<div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div>

<!-- Row 5 -->
<div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell e">E</div><div class="cell e">E</div><div class="cell e">E</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div>

<!-- Row 6 -->
<div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell e">E</div><div class="cell b1">B1</div><div class="cell e">E</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div>

<!-- Row 7 -->
<div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell e">E</div><div class="cell e">E</div><div class="cell e">E</div><div class="cell p">P</div><div class="cell p">P</div><div class="cell p">P</div>

</div>

</div>

</body>
</html>
