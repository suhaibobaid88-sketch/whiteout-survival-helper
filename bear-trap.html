    background: url("WOS.png") center/cover no-repeat;
    color: white;
}

/* overlay */
.overlay {
    background: rgba(0,0,0,0.65);
    min-height: 100vh;
    padding: 20px;
}

/* back */
.back {
    position: absolute;
    top: 15px;
    left: 15px;
    padding: 10px 15px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    text-decoration: none;
    color: white;
    backdrop-filter: blur(8px);
}

/* title */
h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* grid */
.grid {
    display: grid;
    grid-template-columns: repeat(14, 120px);
    gap: 6px;
    justify-content: center;
}

/* cell */
.cell {
    height: 40px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}

/* editable name */
.name {
    background: rgba(255,255,255,0.05);
}

/* special BT */
.bt1 {
    background: rgba(255,0,0,0.3);
    font-weight: bold;
}

.bt2 {
    background: rgba(255,165,0,0.3);
    font-weight: bold;
}

/* responsive */
@media (max-width: 900px) {
    .grid {
        transform: scale(0.6);
        transform-origin: top center;
    }
}
</style>
</head>
