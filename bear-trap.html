<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bear Trap Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("Bear.png") center/cover no-repeat;
}

/* overlay */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 20px;
}

/* toolbar */
.toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
}

button, input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
    backdrop-filter: blur(6px);
}

button:hover {
    transform: scale(1.05);
}

/* canvas */
.canvas {
    width: 100%;
    height: 70vh;
    border: 2px dashed rgba(255,255,255,0.3);
    position: relative;
    overflow: hidden;
}

/* shapes */
.shape {
    position: absolute;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    cursor: move;
    user-select: none;
}

.square {
    border-radius: 5px;
}

.circle {
    border-radius: 50%;
}

.selected {
    outline: 3px solid yellow;
}
</style>
</head>

<body>

<div class="overlay">

<div class="toolbar">
    <button onclick="addShape('square')">⬛ Square</button>
    <button onclick="addShape('circle')">⚪ Circle</button>
    <input type="color" id="colorPicker">
    <button onclick="deleteShape()">🗑 Delete</button>
</div>

<div class="canvas" id="canvas"></div>

</div>

<script>
let selected = null;

// add shape
function addShape(type) {
    const shape = document.createElement("div");
    shape.classList.add("shape", type);
    shape.style.background = document.getElementById("colorPicker").value || "red";
    shape.style.left = "50px";
    shape.style.top = "50px";
    shape.contentEditable = true;
    shape.innerText = "Text";

    // select
    shape.onclick = (e) => {
        e.stopPropagation();
        if (selected) selected.classList.remove("selected");
        selected = shape;
        shape.classList.add("selected");
    };

    // drag
    let offsetX, offsetY;
    shape.onmousedown = (e) => {
        offsetX = e.offsetX;
        offsetY = e.offsetY;

        function move(e) {
            shape.style.left = (e.pageX - offsetX) + "px";
            shape.style.top = (e.pageY - offsetY) + "px";
        }

        document.addEventListener("mousemove", move);

        document.onmouseup = () => {
            document.removeEventListener("mousemove", move);
        };
    };

    document.getElementById("canvas").appendChild(shape);
}

// delete
function deleteShape() {
    if (selected) {
        selected.remove();
        selected = null;
    }
}

// deselect
document.getElementById("canvas").onclick = () => {
    if (selected) selected.classList.remove("selected");
    selected = null;
};
</script>

</body>
</html>
