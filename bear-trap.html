<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bear Trap Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("Bear.png") center/cover no-repeat;
}

.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 15px;
}

.toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 10px;
}

button, input {
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

.canvas {
    width: 100%;
    height: 75vh;
    position: relative;
    background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
}

.shape {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: move;
    user-select: none;
    color: white;
}

.square { border-radius: 6px; }
.circle { border-radius: 50%; }

.selected {
    outline: 2px solid yellow;
}

.resizer {
    width: 10px;
    height: 10px;
    background: white;
    position: absolute;
    bottom: -5px;
    right: -5px;
    cursor: nwse-resize;
}
</style>
</head>

<body>

<div class="overlay">

<div class="toolbar">

    <!-- BACK BUTTON -->
    <button onclick="goBack()">⬅ Back</button>

    <button onclick="addShape('square')">⬛</button>
    <button onclick="addShape('circle')">⚪</button>

    <input type="color" id="shapeColor">
    <input type="range" id="opacity" min="0" max="1" step="0.1" value="0.7">
    <input type="color" id="textColor">

    <button onclick="resize(20)">➕ Shape</button>
    <button onclick="resize(-20)">➖ Shape</button>

    <button onclick="fontSize(2)">A+</button>
    <button onclick="fontSize(-2)">A-</button>

    <button onclick="save()">💾 Save</button>
    <button onclick="deleteShape()">🗑</button>
</div>

<div class="canvas" id="canvas"></div>

</div>

<script>
let shapes = [];
let selected = null;
const grid = 40;

// BACK
function goBack() {
    window.location.href = "more.html";
}

// ADD
function addShape(type) {
    shapes.push({
        type,
        x: 40,
        y: 40,
        w: 80,
        h: 80,
        text: "Name",
        bg: "#ff0000",
        opacity: 0.7,
        color: "#ffffff",
        font: 14
    });
    render();
}

// RENDER
function render() {
    const canvas = document.getElementById("canvas");
    canvas.innerHTML = "";

    shapes.forEach((s, i) => {
        let el = document.createElement("div");
        el.className = `shape ${s.type}`;
        el.style.left = s.x + "px";
        el.style.top = s.y + "px";
        el.style.width = s.w + "px";
        el.style.height = s.h + "px";
        el.style.background = hexToRgba(s.bg, s.opacity);
        el.style.color = s.color;
        el.style.fontSize = s.font + "px";

        el.contentEditable = true;
        el.innerText = s.text;

        el.onclick = (e) => {
            e.stopPropagation();
            selected = i;
            render();
        };

        el.oninput = () => {
            shapes[i].text = el.innerText;
        };

        el.onmousedown = (e) => {
            let offsetX = e.offsetX;
            let offsetY = e.offsetY;

            function move(e) {
                shapes[i].x = snap(e.pageX - offsetX);
                shapes[i].y = snap(e.pageY - offsetY);
                render();
            }

            document.addEventListener("mousemove", move);
            document.onmouseup = () => {
                document.removeEventListener("mousemove", move);
            };
        };

        let r = document.createElement("div");
        r.className = "resizer";

        r.onmousedown = (e) => {
            e.stopPropagation();

            function resizeMove(e) {
                shapes[i].w = snap(e.pageX - s.x);
                shapes[i].h = snap(e.pageY - s.y);
                render();
            }

            document.addEventListener("mousemove", resizeMove);
            document.onmouseup = () => {
                document.removeEventListener("mousemove", resizeMove);
            };
        };

        el.appendChild(r);

        if (i === selected) el.classList.add("selected");

        canvas.appendChild(el);
    });
}

// SNAP
function snap(v) {
    return Math.round(v / grid) * grid;
}

// SIZE
function resize(val) {
    if (selected != null) {
        shapes[selected].w += val;
        shapes[selected].h += val;
        render();
    }
}

// FONT
function fontSize(val) {
    if (selected != null) {
        shapes[selected].font += val;
        render();
    }
}

// COLORS
document.getElementById("shapeColor").oninput = function() {
    if (selected != null) {
        shapes[selected].bg = this.value;
        render();
    }
};

document.getElementById("opacity").oninput = function() {
    if (selected != null) {
        shapes[selected].opacity = this.value;
        render();
    }
};

document.getElementById("textColor").oninput = function() {
    if (selected != null) {
        shapes[selected].color = this.value;
        render();
    }
};

// DELETE
function deleteShape() {
    if (selected != null) {
        shapes.splice(selected, 1);
        selected = null;
        render();
    }
}

// SAVE
function save() {
    localStorage.setItem("bearMap", JSON.stringify(shapes));
}

// LOAD
function load() {
    let data = localStorage.getItem("bearMap");
    if (data) shapes = JSON.parse(data);
    render();
}

// RGBA
function hexToRgba(hex, op) {
    let r = parseInt(hex.substr(1,2),16);
    let g = parseInt(hex.substr(3,2),16);
    let b = parseInt(hex.substr(5,2),16);
    return `rgba(${r},${g},${b},${op})`;
}

document.getElementById("canvas").onclick = () => {
    selected = null;
    render();
};

load();
</script>

</body>
</html>
