<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Island of the Week</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  /* خلفية احترافية */
  background: url('Island.png') center/cover no-repeat fixed;
  position: relative;
}

/* طبقة تغميق عشان كل شيء يبين */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

/* المحتوى */
.container {
  position: relative;
  z-index: 2;
  padding: 20px;
}

/* زر الرجوع */
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  padding: 10px 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  text-decoration: none;
  font-size: 14px;
  backdrop-filter: blur(6px);
  z-index: 9999;
}

/* الجدول */
table {
  width: 100%;
  max-width: 800px;
  margin: 80px auto;
  border-collapse: collapse;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
}

/* الخلايا */
th, td {
  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px;
  text-align: center;
  color: white;
}

/* رأس الجدول */
th {
  background: rgba(255,255,255,0.2);
}

/* إلغاء مؤشر اليد لأن التعديل ممنوع */
td {
  cursor: default;
}

/* موبايل */
@media (max-width: 600px) {
  th, td {
    padding: 6px;
    font-size: 12px;
  }
}
</style>

</head>

<body>

<a class="back-btn" href="./more.html">⬅ Back</a>

<div class="container">

<table id="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Done / No</th>
    </tr>
  </thead>
  <tbody id="table-body">
    </tbody>
</table>

</div>

<script>
const tableBody = document.getElementById("table-body");

/* إنشاء 100 صف ثابتة */
for (let i = 1; i <= 100; i++) {
  let row = document.createElement("tr");

  let nameCell = document.createElement("td");
  let doneCell = document.createElement("td");

  // إضافة النصوص المطلوبة
  nameCell.innerText = "Name " + i;
  doneCell.innerText = i;

  // إيقاف خاصية التعديل (contentEditable = false)
  nameCell.contentEditable = false;
  doneCell.contentEditable = false;

  row.appendChild(nameCell);
  row.appendChild(doneCell);
  tableBody.appendChild(row);
}

// ملاحظة: قمت بإزالة أكواد localStorage لأنك تريد البيانات ثابتة من طرفك فقط
</script>

</body>
</html>
