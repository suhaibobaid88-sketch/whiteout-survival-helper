<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Island of the Week</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;

  /* خلفية احترافية */
  background: url('Island.png') center/cover no-repeat fixed;
  position: relative;
}

/* طبقة تغميق عشان كل شيء يبين */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 0;
}

/* المحتوى */
.container {
  position: relative;
  z-index: 2;
  padding: 20px;
}

/* زر الرجوع */
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;

  padding: 10px 15px;
  border-radius: 20px;

  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);

  color: white;
  text-decoration: none;
  font-size: 14px;

  backdrop-filter: blur(6px);
  z-index: 9999;
}

/* الجدول */
table {
  width: 100%;
  max-width: 800px;
  margin: 80px auto;
  border-collapse: collapse;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
}

/* الخلايا */
th, td {
  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px;
  text-align: center;
  color: white;
}

/* رأس الجدول */
th {
  background: rgba(255,255,255,0.2);
}

/* تعديل مباشر */
td {
  cursor: pointer;
}

td:focus {
  outline: none;
  background: rgba(255,255,255,0.25);
}

/* موبايل */
@media (max-width: 600px) {
  th, td {
    padding: 6px;
    font-size: 12px;
  }
}
</style>

</head>

<body>

<!-- زر الرجوع -->
<a class="back-btn" href="./more.html">⬅ Back</a>

<div class="container">

<table id="table">
  <tr>
    <th>Name</th>
    <th>Done / No</th>
  </tr>
</table>

</div>

<script>
const table = document.getElementById("table");

/* إنشاء 100 صف */
for (let i = 0; i < 100; i++) {
  let row = table.insertRow();

  let nameCell = row.insertCell(0);
  let doneCell = row.insertCell(1);

  nameCell.contentEditable = true;
  doneCell.contentEditable = true;

  /* تحميل البيانات */
  nameCell.innerText = localStorage.getItem("name_" + i) || "";
  doneCell.innerText = localStorage.getItem("done_" + i) || "";

  /* حفظ تلقائي */
  nameCell.addEventListener("input", () => {
    localStorage.setItem("name_" + i, nameCell.innerText);
  });

  doneCell.addEventListener("input", () => {
    localStorage.setItem("done_" + i, doneCell.innerText);
  });
}
</script>

</body>
</html>
