<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>More - Whiteout Survival</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;

  background-image: url('WOS.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* طبقة شفافية */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 1;
}

/* المحتوى */
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 20px;
}

/* زر الـ More بنفس الستايل اللي بتحبه */
.more-btn {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  background: rgba(255,215,0,0.8);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.more-btn:hover {
  background: gold;
  transform: scale(1.05);
}
</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <button class="more-btn" onclick="location.href='alliance.html'">
        Back to Alliance
    </button>
</div>

</body>
</html>
