<style>
body{
    margin:0;
    font-family:Arial;
    background:url("Clk.png") center/cover no-repeat;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.78);
    min-height:100vh;
    padding:12px;
}

/* 🔥 MAIN CONTAINER */
.container{
    max-width:1000px;
    margin:auto;
}

/* 🎮 CARD STYLE (Game Panel) */
.card{
    background:rgba(20,20,20,0.75);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:14px;
    padding:12px;
    margin-bottom:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* TITLE */
.card h3{
    margin:0 0 10px;
    font-size:16px;
    color:#ffd700;
}

/* LABEL SMALL */
.label{
    font-size:12px;
    opacity:0.7;
    margin:6px 0 4px;
}

/* GRID INPUTS */
.grid4{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:6px;
}

.grid2{
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:6px;
}

/* INPUT STYLE */
input{
    width:100%;
    padding:6px;
    border-radius:6px;
    border:none;
    font-size:13px;
    background:rgba(255,255,255,0.1);
    color:white;
    outline:none;
}

input::placeholder{
    color:rgba(255,255,255,0.5);
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#ffcc00,#ff8800);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* RESULT BOX */
.result{
    background:rgba(0,0,0,0.6);
    padding:12px;
    border-radius:10px;
    white-space:pre-line;
    font-size:14px;
}

/* BACK */
.back{
    margin-bottom:10px;
    background:#444;
    color:white;
}
</style>
