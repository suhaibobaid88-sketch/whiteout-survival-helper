<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WOS Calculator Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("Clk.png") center/cover no-repeat;
    color:white;
}

.overlay{
    background:rgba(0,0,0,0.75);
    min-height:100vh;
    padding:15px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:12px;
    margin-bottom:12px;
}

h3{
    margin:5px 0 10px;
}

/* 🔥 GRID SYSTEM (هذا سر الشكل الحلو) */
.row{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap:6px;
    margin-bottom:6px;
}

.row-2{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:6px;
}

input{
    width:100%;
    padding:6px;
    border:none;
    border-radius:6px;
    font-size:13px;
}

.small{
    font-size:12px;
    opacity:0.8;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:rgba(255,255,255,0.2);
    color:white;
}

.result{
    white-space:pre-line;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<h2>🔥 WOS Troops Calculator PRO</h2>

<!-- ================= INFANTRY ================= -->
<div class="card">
<h3>🪖 Infantry</h3>

<input id="infNum" placeholder="Troops Number">

<div class="small">💰 Cost per troop</div>
<div class="row-2">
<input id="infMeat" placeholder="Meat">
<input id="infWood" placeholder="Wood">
</div>
<div class="row-2">
<input id="infIron" placeholder="Iron">
<input id="infCoal" placeholder="Coal">
</div>

<div class="small">⏱ Time per troop (D / H / M / S)</div>
<div class="row">
<input id="infD" placeholder="Days">
<input id="infH" placeholder="Hours">
<input id="infM" placeholder="Min">
<input id="infS" placeholder="Sec">
</div>

<input id="infPower" placeholder="Power per troop">
</div>

<!-- ================= LANCER ================= -->
<div class="card">
<h3>🐎 Lancer</h3>

<input id="lanNum" placeholder="Troops Number">

<div class="row-2">
<input id="lanMeat" placeholder="Meat">
<input id="lanWood" placeholder="Wood">
</div>
<div class="row-2">
<input id="lanIron" placeholder="Iron">
<input id="lanCoal" placeholder="Coal">
</div>

<div class="row">
<input id="lanD" placeholder="D">
<input id="lanH" placeholder="H">
<input id="lanM" placeholder="M">
<input id="lanS" placeholder="S">
</div>

<input id="lanPower" placeholder="Power per troop">
</div>

<!-- ================= MARKSMAN ================= -->
<div class="card">
<h3>🎯 Marksman</h3>

<input id="marNum" placeholder="Troops Number">

<div class="row-2">
<input id="marMeat" placeholder="Meat">
<input id="marWood" placeholder="Wood">
</div>
<div class="row-2">
<input id="marIron" placeholder="Iron">
<input id="marCoal" placeholder="Coal">
</div>

<div class="row">
<input id="marD" placeholder="D">
<input id="marH" placeholder="H">
<input id="marM" placeholder="M">
<input id="marS" placeholder="S">
</div>

<input id="marPower" placeholder="Power per troop">
</div>

<button onclick="calc()">⚡ CALCULATE</button>

<div class="card result" id="result"></div>

</div>
</div>

<script>

function toSeconds(d,h,m,s){
    return (d*86400)+(h*3600)+(m*60)+Number(s);
}

function format(sec){
    let d=Math.floor(sec/86400);
    sec%=86400;
    let h=Math.floor(sec/3600);
    sec%=3600;
    let m=Math.floor(sec/60);
    let s=sec%60;
    return `${d}D ${h}H ${m}M ${s}S`;
}

function calc(){

let totalM=0,totalW=0,totalI=0,totalC=0,totalP=0,totalT=0;

function run(num,m,w,i,c,d,h,mi,s,p){

    let n=+num.value||0;

    totalM += n*(+m.value||0);
    totalW += n*(+w.value||0);
    totalI += n*(+i.value||0);
    totalC += n*(+c.value||0);

    totalP += n*(+p.value||0);

    let t=toSeconds(+d.value||0,+h.value||0,+mi.value||0,+s.value||0);
    totalT += n*t;
}

// Infantry
run(infNum,infMeat,infWood,infIron,infCoal,infD,infH,infM,infS,infPower);

// Lancer
run(lanNum,lanMeat,lanWood,lanIron,lanCoal,lanD,lanH,lanM,lanS,lanPower);

// Marksman
run(marNum,marMeat,marWood,marIron,marCoal,marD,marH,marM,marS,marPower);

result.innerText=
`📊 TOTAL RESULT

🥩 Meat: ${totalM}
🪵 Wood: ${totalW}
🔩 Iron: ${totalI}
🪨 Coal: ${totalC}

⚡ Power: ${totalP}

⏱ Time: ${format(totalT)}`;
}

</script>

</body>
</html>
