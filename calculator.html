<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WOS Troops Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("Clk.png") center/cover no-repeat;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
    padding: 15px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

h2, h3 {
    margin: 5px 0;
}

p {
    margin: 8px 0 4px;
    opacity: 0.8;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 4px 0;
    border: none;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
}

.result {
    white-space: pre-line;
    line-height: 1.6;
}

.back {
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<button class="back" onclick="goBack()">⬅ Back</button>

<h2>🔥 WOS Troops Calculator</h2>

<!-- ================= INFANTRY ================= -->
<div class="card">
<h3>🪖 Infantry</h3>

<input id="infNum" placeholder="Enter number of Infantry">

<p>💰 Cost per 1 Infantry</p>
<input id="infMeat" placeholder="Meat per troop">
<input id="infWood" placeholder="Wood per troop">
<input id="infIron" placeholder="Iron per troop">
<input id="infCoal" placeholder="Coal per troop">

<p>⏱ Training Time per 1 Infantry (DD / HH / MM / SS)</p>
<input id="infTimeD" placeholder="Days">
<input id="infTimeH" placeholder="Hours">
<input id="infTimeM" placeholder="Minutes">
<input id="infTimeS" placeholder="Seconds">

<input id="infPower" placeholder="Power per troop">
</div>

<!-- ================= LANCER ================= -->
<div class="card">
<h3>🐎 Lancer</h3>

<input id="lanNum" placeholder="Enter number of Lancer">

<p>💰 Cost per 1 Lancer</p>
<input id="lanMeat" placeholder="Meat per troop">
<input id="lanWood" placeholder="Wood per troop">
<input id="lanIron" placeholder="Iron per troop">
<input id="lanCoal" placeholder="Coal per troop">

<p>⏱ Training Time per 1 Lancer (DD / HH / MM / SS)</p>
<input id="lanTimeD" placeholder="Days">
<input id="lanTimeH" placeholder="Hours">
<input id="lanTimeM" placeholder="Minutes">
<input id="lanTimeS" placeholder="Seconds">

<input id="lanPower" placeholder="Power per troop">
</div>

<!-- ================= MARKSMAN ================= -->
<div class="card">
<h3>🎯 Marksman</h3>

<input id="marNum" placeholder="Enter number of Marksman">

<p>💰 Cost per 1 Marksman</p>
<input id="marMeat" placeholder="Meat per troop">
<input id="marWood" placeholder="Wood per troop">
<input id="marIron" placeholder="Iron per troop">
<input id="marCoal" placeholder="Coal per troop">

<p>⏱ Training Time per 1 Marksman (DD / HH / MM / SS)</p>
<input id="marTimeD" placeholder="Days">
<input id="marTimeH" placeholder="Hours">
<input id="marTimeM" placeholder="Minutes">
<input id="marTimeS" placeholder="Seconds">

<input id="marPower" placeholder="Power per troop">
</div>

<button onclick="calc()">⚡ Calculate Total</button>

<div class="card result" id="result"></div>

</div>
</div>

<script>

// ===== BACK =====
function goBack(){
    window.location.href = "more.html";
}

// ===== TIME CONVERTER =====
function toSeconds(d,h,m,s){
    return (Number(d||0)*86400) +
           (Number(h||0)*3600) +
           (Number(m||0)*60) +
           Number(s||0);
}

// ===== FORMAT TIME =====
function format(sec){
    let d = Math.floor(sec/86400);
    sec %= 86400;
    let h = Math.floor(sec/3600);
    sec %= 3600;
    let m = Math.floor(sec/60);
    let s = sec % 60;

    return `${d}D ${h}H ${m}M ${s}S`;
}

// ===== MAIN CALC =====
function calc(){

    let totalMeat=0, totalWood=0, totalIron=0, totalCoal=0;
    let totalPower=0, totalTime=0;

    function process(num, meat, wood, iron, coal, tD, tH, tM, tS, power){

        let n = Number(num.value||0);

        let m = Number(meat.value||0);
        let w = Number(wood.value||0);
        let i = Number(iron.value||0);
        let c = Number(coal.value||0);

        let time = toSeconds(tD.value, tH.value, tM.value, tS.value);
        let p = Number(power.value||0);

        totalMeat += n * m;
        totalWood += n * w;
        totalIron += n * i;
        totalCoal += n * c;

        totalPower += n * p;
        totalTime += n * time;
    }

    // INFANTRY
    process(infNum, infMeat, infWood, infIron, infCoal,
            infTimeD, infTimeH, infTimeM, infTimeS, infPower);

    // LANCER
    process(lanNum, lanMeat, lanWood, lanIron, lanCoal,
            lanTimeD, lanTimeH, lanTimeM, lanTimeS, lanPower);

    // MARKSMAN
    process(marNum, marMeat, marWood, marIron, marCoal,
            marTimeD, marTimeH, marTimeM, marTimeS, marPower);

    document.getElementById("result").innerText = `
📊 TOTAL RESULTS

🥩 Meat: ${totalMeat.toLocaleString()}
🪵 Wood: ${totalWood.toLocaleString()}
🔩 Iron: ${totalIron.toLocaleString()}
🪨 Coal: ${totalCoal.toLocaleString()}

⚡ Power: ${totalPower.toLocaleString()}

⏱ Time: ${format(totalTime)}
`;
}

</script>

</body>
</html>
