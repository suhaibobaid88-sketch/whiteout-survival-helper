<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WOS Troops Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("Clk.png") center/cover no-repeat;
    color: white;
}

.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
    padding: 15px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
}

h2, h3 {
    margin: 5px 0;
}

input {
    width: 100%;
    padding: 8px;
    margin: 4px 0;
    border: none;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
}

.result {
    white-space: pre-line;
    line-height: 1.6;
}

.back {
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="overlay">
<div class="container">

<button class="back" onclick="goBack()">⬅ Back</button>

<h2>Troops Calculator</h2>

<!-- INFANTRY -->
<div class="card">
<h3>Infantry</h3>

<input id="infNum" placeholder="Number of Infantry">

<h4>Cost per 1 Infantry</h4>
<input id="infMeat" placeholder="Meat per troop">
<input id="infWood" placeholder="Wood per troop">
<input id="infIron" placeholder="Iron per troop">
<input id="infCoal" placeholder="Coal per troop">

<input id="infTimeD" placeholder="Days per troop">
<input id="infTimeH" placeholder="Hours">
<input id="infTimeM" placeholder="Minutes">
<input id="infTimeS" placeholder="Seconds">

<input id="infPower" placeholder="Power per troop">
</div>

<!-- LANCER -->
<div class="card">
<h3>Lancer</h3>

<input id="lanNum">

<h4>Cost per 1 Lancer</h4>
<input id="lanMeat">
<input id="lanWood">
<input id="lanIron">
<input id="lanCoal">

<input id="lanTimeD">
<input id="lanTimeH">
<input id="lanTimeM">
<input id="lanTimeS">

<input id="lanPower">
</div>

<!-- MARKSMAN -->
<div class="card">
<h3>Marksman</h3>

<input id="marNum">

<h4>Cost per 1 Marksman</h4>
<input id="marMeat">
<input id="marWood">
<input id="marIron">
<input id="marCoal">

<input id="marTimeD">
<input id="marTimeH">
<input id="marTimeM">
<input id="marTimeS">

<input id="marPower">
</div>

<button onclick="calc()">Calculate Total</button>

<div class="card result" id="result"></div>

</div>
</div>

<script>

function toSeconds(d,h,m,s){
    return (d*86400)+(h*3600)+(m*60)+Number(s);
}

function formatTime(sec){
    let d = Math.floor(sec/86400);
    sec %= 86400;
    let h = Math.floor(sec/3600);
    sec %= 3600;
    let m = Math.floor(sec/60);
    let s = sec % 60;
    return `${d}D ${h}H ${m}M ${s}S`;
}

function goBack(){
    window.location.href = "more.html";
}

function calc(){

    let totalMeat=0, totalWood=0, totalIron=0, totalCoal=0;
    let totalPower=0, totalTime=0;

    function calcType(num, meat, wood, iron, coal, time, power){

        num = +num.value || 0;

        let m = +meat.value || 0;
        let w = +wood.value || 0;
        let i = +iron.value || 0;
        let c = +coal.value || 0;

        let d = +time[0].value || 0;
        let h = +time[1].value || 0;
        let mm = +time[2].value || 0;
        let s = +time[3].value || 0;

        let p = +power.value || 0;

        let singleTime = toSeconds(d,h,mm,s);

        totalMeat += num * m;
        totalWood += num * w;
        totalIron += num * i;
        totalCoal += num * c;

        totalPower += num * p;
        totalTime += num * singleTime;
    }

    // INFANTRY
    calcType(
        infNum,
        infMeat, infWood, infIron, infCoal,
        [infTimeD, infTimeH, infTimeM, infTimeS],
        infPower
    );

    // LANCER
    calcType(
        lanNum,
        lanMeat, lanWood, lanIron, lanCoal,
        [lanTimeD, lanTimeH, lanTimeM, lanTimeS],
        lanPower
    );

    // MARKSMAN
    calcType(
        marNum,
        marMeat, marWood, marIron, marCoal,
        [marTimeD, marTimeH, marTimeM, marTimeS],
        marPower
    );

    document.getElementById("result").innerText = `
TOTAL RESULTS

🥩 Meat: ${totalMeat}
🪵 Wood: ${totalWood}
🔩 Iron: ${totalIron}
🪨 Coal: ${totalCoal}

⚡ Power: ${totalPower}

⏱ Time: ${formatTime(totalTime)}
`;
}

</script>

</body>
</html>
