<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WOS Troops Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial;
    color: white;
}

.bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url("Clk.png") center/cover no-repeat;
    z-index: -1;
}

.overlay {
    min-height: 100vh;
    background: rgba(0,0,0,0.85);
    padding: 12px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.card {
    background: rgba(30,30,30,0.8);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 16px;
}

h2 { margin: 0 0 10px; text-align: center; color: #ffcc00; }
h3 { margin: 0 0 10px; color: #ffd700; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

.label { font-size: 12px; opacity: 0.7; margin: 12px 0 6px; color: #00ffcc; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 6px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 6px; }

input {
    width: 100%;
    padding: 12px; /* كبرت المسافة شوي عشان اللمس */
    border-radius: 7px;
    border: none;
    font-size: 15px;
    background: rgba(255,255,255,0.2);
    color: white;
    box-sizing: border-box;
    outline: none;
}

input:focus {
    background: rgba(255,255,255,0.3);
    border: 1px solid #ffcc00;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg,#ffcc00,#ff8800);
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    color: black;
}

.result {
    white-space: pre-line;
    line-height: 1.8;
    font-size: 16px;
    border: 2px solid #ffcc00;
    margin-top: 15px;
}

.back { margin-bottom: 15px; background: #444; color: white; width: auto; padding: 10px 25px; }
</style>
</head>

<body>
<div class="bg"></div>
<div class="overlay">
<div class="container">

<button class="back" onclick="goBack()">⬅ Back</button>

<h2>🔥 Resources & Speedups Calc</h2>

<div class="card">
<h3>🪖 Infantry</h3>
<input id="infNum" type="text" inputmode="numeric" placeholder="Number of Troops">

<div class="label">💰 Total Resources</div>
<div class="grid2">
    <input id="infMeat" type="text" inputmode="numeric" placeholder="Meat">
    <input id="infWood" type="text" inputmode="numeric" placeholder="Wood">
</div>
<div class="grid2">
    <input id="infIron" type="text" inputmode="numeric" placeholder="Iron">
    <input id="infCoal" type="text" inputmode="numeric" placeholder="Coal">
</div>

<div class="label">⏱ Total Time (D / H / M / S)</div>
<div class="grid4">
    <input id="infD" type="text" inputmode="numeric" placeholder="D">
    <input id="infH" type="text" inputmode="numeric" placeholder="H">
    <input id="infM" type="text" inputmode="numeric" placeholder="M">
    <input id="infS" type="text" inputmode="numeric" placeholder="S">
</div>
<input id="infPower" type="text" inputmode="numeric" placeholder="Total Power">
</div>

<div class="card">
<h3>🐎 Lancer</h3>
<input id="lanNum" type="text" inputmode="numeric" placeholder="Number of Troops">

<div class="label">💰 Total Resources</div>
<div class="grid2">
    <input id="lanMeat" type="text" inputmode="numeric" placeholder="Meat">
    <input id="lanWood" type="text" inputmode="numeric" placeholder="Wood">
</div>
<div class="grid2">
    <input id="lanIron" type="text" inputmode="numeric" placeholder="Iron">
    <input id="lanCoal" type="text" inputmode="numeric" placeholder="Coal">
</div>

<div class="label">⏱ Total Time</div>
<div class="grid4">
    <input id="lanD" type="text" inputmode="numeric" placeholder="D">
    <input id="lanH" type="text" inputmode="numeric" placeholder="H">
    <input id="lanM" type="text" inputmode="numeric" placeholder="M">
    <input id="lanS" type="text" inputmode="numeric" placeholder="S">
</div>
<input id="lanPower" type="text" inputmode="numeric" placeholder="Total Power">
</div>

<div class="card">
<h3>🎯 Marksman</h3>
<input id="marNum" type="text" inputmode="numeric" placeholder="Number of Troops">

<div class="label">💰 Total Resources</div>
<div class="grid2">
    <input id="marMeat" type="text" inputmode="numeric" placeholder="Meat">
    <input id="marWood" type="text" inputmode="numeric" placeholder="Wood">
</div>
<div class="grid2">
    <input id="marIron" type="text" inputmode="numeric" placeholder="Iron">
    <input id="marCoal" type="text" inputmode="numeric" placeholder="Coal">
</div>

<div class="label">⏱ Total Time</div>
<div class="grid4">
    <input id="marD" type="text" inputmode="numeric" placeholder="D">
    <input id="marH" type="text" inputmode="numeric" placeholder="H">
    <input id="marM" type="text" inputmode="numeric" placeholder="M">
    <input id="marS" type="text" inputmode="numeric" placeholder="S">
</div>
<input id="marPower" type="text" inputmode="numeric" placeholder="Total Power">
</div>

<button onclick="calc()">⚡ CALCULATE TOTAL</button>

<div class="card result" id="result" style="display:none;"></div>

</div>
</div>

<script>
function goBack(){ window.location.href = "more.html"; }

function toSeconds(d,h,m,s){
    return (Number(d||0)*86400)+(Number(h||0)*3600)+(Number(m||0)*60)+Number(s||0);
}

function format(sec){
    let d=Math.floor(sec/86400);
    sec%=86400;
    let h=Math.floor(sec/3600);
    sec%=3600;
    let m=Math.floor(sec/60);
    let s=sec%60;
    return `${d}D ${h}H ${m}M ${s}S`;
}

function calc(){
    let M=0, W=0, I=0, C=0, P=0, T=0, totalTroops=0;

    function gather(num, meat, wood, iron, coal, d, h, m, s, p){
        totalTroops += (+num.value || 0);
        M += (+meat.value || 0);
        W += (+wood.value || 0);
        I += (+iron.value || 0);
        C += (+coal.value || 0);
        P += (+p.value || 0);
        T += toSeconds(d.value, h.value, m.value, s.value);
    }

    gather(infNum, infMeat, infWood, infIron, infCoal, infD, infH, infM, infS, infPower);
    gather(lanNum, lanMeat, lanWood, lanIron, lanCoal, lanD, lanH, lanM, lanS, lanPower);
    gather(marNum, marMeat, marWood, marIron, marCoal, marD, marH, marM, marS, marPower);

    const resDiv = document.getElementById("result");
    resDiv.style.display = "block";
    resDiv.innerText = 
    `📊 GRAND TOTAL RESULT

    🪖 Total Combined Troops: ${totalTroops.toLocaleString()}

    🥩 Total Meat: ${M.toLocaleString()}
    🪵 Total Wood: ${W.toLocaleString()}
    🔩 Total Iron: ${I.toLocaleString()}
    🪨 Total Coal: ${C.toLocaleString()}

    ⚡ Total Power Gained: ${P.toLocaleString()}

    ⏱ Total Acceleration Needed: 
    ${format(T)}`;
}
</script>

</body>
</html>
