<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access System - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* استخدام الصورة المطلوبة */
            background: url('Duser.png') center/cover no-repeat fixed;
            overflow: hidden;
        }

        /* طبقة تغميق للخلفية */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1;
        }

        /* كرت تسجيل الدخول */
        .login-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 320px;
            text-align: center;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .login-card h2 {
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ffcc00; /* لون ذهبي */
            color: black;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #ffdb4d;
            transform: scale(1.03);
        }

        /* رسالة الخطأ */
        #error-msg {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }

        /* انيميشن الاهتزاز */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="login-card" id="loginCard">
    <h2>KIS System</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkLogin()">LOGIN</button>
    <p id="error-msg">Invalid Credentials! Try Again.</p>
</div>

<script>
function checkLogin() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    const card = document.getElementById("loginCard");
    const errorMsg = document.getElementById("error-msg");

    // قائمة الـ 50 مستخدم (تعدلها يدوياً من هنا في أي وقت)
    const users = {
        "KIS1": "pass1", "KIS2": "pass2", "KIS3": "pass3", "KIS4": "pass4", "KIS5": "pass5",
        "KIS6": "pass6", "KIS7": "pass7", "KIS8": "pass8", "KIS9": "pass9", "KIS10": "pass10",
        "KIS11": "pass11", "KIS12": "pass12", "KIS13": "pass13", "KIS14": "pass14", "KIS15": "pass15",
        "KIS16": "pass16", "KIS17": "pass17", "KIS18": "pass18", "KIS19": "pass19", "KIS20": "pass20",
        "KIS21": "pass21", "KIS22": "pass22", "KIS23": "pass23", "KIS24": "pass24", "KIS25": "pass25",
        "KIS26": "pass26", "KIS27": "pass27", "KIS28": "pass28", "KIS29": "pass29", "KIS30": "pass30",
        "KIS31": "pass31", "KIS32": "pass32", "KIS33": "pass33", "KIS34": "pass34", "KIS35": "pass35",
        "KIS36": "pass36", "KIS37": "pass37", "KIS38": "pass38", "KIS39": "pass39", "KIS40": "pass40",
        "KIS41": "pass41", "KIS42": "pass42", "KIS43": "pass43", "KIS44": "pass44", "KIS45": "pass45",
        "KIS46": "pass46", "KIS47": "pass47", "KIS48": "pass48", "KIS49": "pass49", "KIS50": "pass50"
    };

    if (users[user] && users[user] === pass) {
        // إذا كان الدخول صحيحاً، يتوجه لصفحة index.html
        window.location.href = "index.html";
    } else {
        // إظهار الخطأ وتفعيل الاهتزاز
        errorMsg.style.display = "block";
        card.classList.add("shake");
        
        // إزالة الكلاس بعد انتهاء الانيميشن ليعمل مرة أخرى في المحاولة القادمة
        setTimeout(() => {
            card.classList.remove("shake");
        }, 400);
    }
}
</script>

</body>
</html>
